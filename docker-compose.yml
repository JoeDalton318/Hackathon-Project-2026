# ============================================
# DOCKER COMPOSE - PROJET HACKATHON 2026
# ============================================
# Lancez depuis la RACINE du projet :
#   docker-compose up --build
# Le fichier .env doit être à la racine du projet
# ============================================

services:
  # PostgreSQL - Base de données pour Airflow uniquement
  postgres:
    image: postgres:15-alpine
    container_name: hackathon_postgres
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackathon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Data Lake (compatible S3)
  minio:
    image: minio/minio:latest
    container_name: hackathon_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - hackathon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init - Création automatique du bucket datalake
  minio-init:
    image: minio/mc:latest
    container_name: hackathon_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/datalake --ignore-existing;
      echo 'Bucket datalake créé avec succès';
      exit 0;
      "
    networks:
      - hackathon_network

  # Airflow Init - Initialisation de la base de données
  airflow-init:
    build:
      context: ./orchestration
      dockerfile: Dockerfile.airflow
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_init
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true
        airflow dags unpause doc_pipeline || true
        echo "Airflow initialization complete!"
    networks:
      - hackathon_network
    restart: on-failure

  # Airflow Webserver
  airflow-webserver:
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_webserver
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      BACKEND_API_URL: http://backend:8000
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_URL: http://airflow-webserver:8080
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./nlp-ocr:/opt/airflow/nlp-ocr
      - ./validation:/opt/airflow/validation
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - hackathon_network
    restart: unless-stopped

  # Airflow Scheduler
  airflow-scheduler:
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_scheduler
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      BACKEND_API_URL: http://backend:8000
      MINIO_ENDPOINT: minio:9000
      AIRFLOW_URL: http://airflow-webserver:8080
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./nlp-ocr:/opt/airflow/nlp-ocr
      - ./validation:/opt/airflow/validation
    command: scheduler
    networks:
      - hackathon_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon_backend
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - hackathon_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend — npm run build (multi-stage) + nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
    container_name: hackathon_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - hackathon_network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  hackathon_network:
    driver: bridge
