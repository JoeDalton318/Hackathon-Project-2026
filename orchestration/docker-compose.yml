version: '3.8'

# ============================================
# DOCKER COMPOSE - PROJET HACKATHON 2026
# ============================================
# IMPORTANT: Le fichier .env doit être à la RACINE du projet
# Les services chargent le fichier ../.env (relatif à orchestration/)
# ============================================

services:
  # PostgreSQL - Base de données pour Airflow uniquement
  postgres:
    image: postgres:15-alpine
    container_name: hackathon_postgres
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackathon_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Atlas (Cloud) - Base de données principale fournie par Samuel
  # Cluster cloud accessible depuis tous les services
  # Plus besoin de MongoDB local, on utilise mongodb+srv://...
  # 
  # Pour dev local uniquement, décommenter ci-dessous:
  # mongodb:
  #   image: mongo:7.0
  #   container_name: hackathon_mongodb
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: hackathon_admin
  #     MONGO_INITDB_ROOT_PASSWORD: hackathon_admin_pass
  #     MONGO_INITDB_DATABASE: hackathon_db
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #     - ../data-architecture/init-scripts:/docker-entrypoint-initdb.d
  #   networks:
  #     - hackathon_network

  # MinIO - Data Lake (compatible S3)
  minio:
    image: minio/minio:latest
    container_name: hackathon_minio
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - hackathon_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init - Création automatique du bucket datalake
  minio-init:
    image: minio/mc:latest
    container_name: hackathon_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb myminio/datalake --ignore-existing;
      echo '✓ Bucket datalake créé avec succès';
      exit 0;
      "
    networks:
      - hackathon_network

  # Airflow Init - Initialisation de la base de données
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_init
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true
        echo "Airflow initialization complete!"
    networks:
      - hackathon_network
    restart: on-failure

  # Airflow Webserver
  airflow-webserver:
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_webserver
    env_file:
      - ../.env
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ../nlp-ocr/scripts:/opt/airflow/nlp-ocr
      - ../validation/scripts:/opt/airflow/validation
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - hackathon_network

  # Airflow Scheduler
  airflow-scheduler:
    image: hackathon-airflow:latest
    container_name: hackathon_airflow_scheduler
    env_file:
      - ../.env
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@postgres/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ../nlp-ocr/scripts:/opt/airflow/nlp-ocr
      - ../validation/scripts:/opt/airflow/validation
    command: scheduler
    networks:
      - hackathon_network

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hackathon_backend
    env_file:
      - ../.env
    depends_on:
      - minio
    environment:
      DATABASE_URL: ${MONGO_URL}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app
    networks:
      - hackathon_network

  # React Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hackathon_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    networks:
      - hackathon_network

volumes:
  postgres_data:
  # mongodb_data:  # Non utilisé avec MongoDB Atlas
  minio_data:

networks:
  hackathon_network:
    driver: bridge